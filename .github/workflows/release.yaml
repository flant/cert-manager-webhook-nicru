name: release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read
  packages: write

jobs:
  docker-image:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Compute release version
        id: vars
        shell: bash
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          major_minor="${version%.*}"
          major="${version%%.*}"

          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "major_minor=${major_minor}" >> "$GITHUB_OUTPUT"
          echo "major=${major}" >> "$GITHUB_OUTPUT"
          echo "image=ghcr.io/${GITHUB_REPOSITORY_OWNER}/cert-manager-webhook-nicru" >> "$GITHUB_OUTPUT"

      - name: Set up Docker buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ steps.vars.outputs.image }}:${{ steps.vars.outputs.version }}
            ${{ steps.vars.outputs.image }}:${{ steps.vars.outputs.major_minor }}
            ${{ steps.vars.outputs.image }}:${{ steps.vars.outputs.major }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  helm-oci:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.14.4

      - name: Compute release version
        id: vars
        shell: bash
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "oci_repo=oci://ghcr.io/${GITHUB_REPOSITORY_OWNER}/charts" >> "$GITHUB_OUTPUT"

      - name: Login to GHCR (Helm OCI)
        shell: bash
        run: |
          set -euo pipefail
          helm registry login ghcr.io -u "${GITHUB_REPOSITORY_OWNER}" -p "${{ secrets.GITHUB_TOKEN }}"

      - name: Package chart
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          helm package helm --version "${{ steps.vars.outputs.version }}" --destination dist

      - name: Push chart to OCI registry
        shell: bash
        run: |
          set -euo pipefail
          chart_tgz="$(ls dist/*.tgz)"
          helm push "${chart_tgz}" "${{ steps.vars.outputs.oci_repo }}"
